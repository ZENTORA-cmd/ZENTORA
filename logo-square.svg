<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .icon-bg {
        fill: #45110E; /* Deep burgundy background */
      }
      .monitor-frame {
        fill: #FF8DA7;
      }
      .monitor-stand {
        fill: #FF8DA7;
      }
      .duck-body {
        fill: #FFE066;
      }
      .duck-wing {
        fill: #F59E0B;
      }
      .duck-beak {
        fill: #F97316;
      }
      .code-line {
        stroke: #A5B4FC;
        stroke-width: 2;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <!-- Container Box -->
  <rect width="100" height="100" rx="22" class="icon-bg" />
  
  <g transform="translate(50, 45)">
    <!-- Monitor Stand -->
    <path d="M0,15 L-3,32 L5,32 L2,15 Z" class="monitor-stand" />
    
    <!-- Monitor Group (tilted) -->
    <g transform="translate(2, 4) rotate(-15)">
      <rect x="-25" y="-18" width="50" height="36" rx="5" class="monitor-frame" />
      <rect x="-21" y="-14" width="42" height="28" rx="2" fill="#1C1917" />
      <line x1="-17" y1="-8" x2="-5" y2="-8" class="code-line" />
      <line x1="-17" y1="-3" x2="-2" y2="-3" class="code-line" />
      <line x1="-17" y1="2" x2="-7" y2="2" class="code-line" />
      <line x1="-17" y1="7" x2="-4" y2="7" class="code-line" />
      
      <g transform="translate(7, 2)">
        <ellipse cx="4" cy="4" rx="6" ry="4.5" class="duck-body" />
        <path d="M1,4 C1,2.5 4,2.5 5,4 C5,5.5 2,5.5 1,4 Z" class="duck-wing" />
        <circle cx="7" cy="-1" r="3.5" class="duck-body" />
        <path d="M10.5,-2 L13,-1 L10.5,0 Z" class="duck-beak" />
        <circle cx="6.5" cy="-2.2" r="0.6" fill="#1C1917" />
      </g>
    </g>
  </g>
</svg>
