<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="100%" height="100%">
  <!-- Import Lora Font for the serif text -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&amp;display=swap');
      .logo-text {
        font-family: 'Lora', 'Georgia', serif;
        font-weight: 600;
        fill: #45110E; /* Deep burgundy for light theme visibility */
        letter-spacing: -0.5px;
      }
      .monitor-frame {
        fill: #FF8DA7;
      }
      .monitor-stand {
        fill: #FF8DA7;
      }
      .duck-body {
        fill: #FFE066;
      }
      .duck-wing {
        fill: #F59E0B;
      }
      .duck-beak {
        fill: #F97316;
      }
      .code-line {
        stroke: #A5B4FC;
        stroke-width: 2;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <g transform="translate(0, 5)">
    <!-- Zentora Text -->
    <text x="15" y="75" class="logo-text" font-size="52">Zentora</text>

    <!-- Monitor Stand (behind text/aligned with 't') -->
    <path d="M141,45 L138,62 L146,62 L143,45 Z" class="monitor-stand" />

    <!-- Monitor Group (tilted) -->
    <g transform="translate(141, 34) rotate(-15)">
      <!-- Outer Frame (tilted monitor) -->
      <rect x="-25" y="-18" width="50" height="36" rx="5" class="monitor-frame" />
      
      <!-- Screen Inner -->
      <rect x="-21" y="-14" width="42" height="28" rx="2" fill="#1C1917" />
      
      <!-- Code Lines on left of screen -->
      <line x1="-17" y1="-8" x2="-5" y2="-8" class="code-line" />
      <line x1="-17" y1="-3" x2="-2" y2="-3" class="code-line" />
      <line x1="-17" y1="2" x2="-7" y2="2" class="code-line" />
      <line x1="-17" y1="7" x2="-4" y2="7" class="code-line" />
      
      <!-- Rubber Duck on right of screen -->
      <g transform="translate(7, 2)">
        <!-- Duck Body -->
        <ellipse cx="4" cy="4" rx="6" ry="4.5" class="duck-body" />
        <!-- Duck Wing -->
        <path d="M1,4 C1,2.5 4,2.5 5,4 C5,5.5 2,5.5 1,4 Z" class="duck-wing" />
        <!-- Duck Head -->
        <circle cx="7" cy="-1" r="3.5" class="duck-body" />
        <!-- Duck Beak -->
        <path d="M10.5,-2 L13,-1 L10.5,0 Z" class="duck-beak" />
        <!-- Duck Eye -->
        <circle cx="6.5" cy="-2.2" r="0.6" fill="#1C1917" />
      </g>
    </g>
  </g>
</svg>
